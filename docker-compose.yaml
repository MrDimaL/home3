services:
  db:
    image: postgres:15
    container_name: wms-db
    environment:
      POSTGRES_DB: wms
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d

  userver:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: wms
      DB_USER: user
      DB_PASSWORD: pass